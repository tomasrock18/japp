services:
  database:
    image: postgres:15-alpine
    container_name: japp_database
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - japp_database:/var/lib/postgresql/data

volumes:
  japp_database:
